<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 身体 -->
  <circle cx="100" cy="120" r="50" fill="#FFD700" stroke="#DAA520" stroke-width="3"/>
  <!-- 头 -->
  <circle cx="100" cy="70" r="40" fill="#FFD700" stroke="#DAA520" stroke-width="3"/>
  <!-- 耳朵 -->
  <polygon points="65,40 75,10 85,40" fill="#FFD700" stroke="#DAA520" stroke-width="2"/>
  <polygon points="115,40 125,10 135,40" fill="#FFD700" stroke="#DAA520" stroke-width="2"/>
  <!-- 眼睛 -->
  <circle cx="85" cy="65" r="8" fill="white"/>
  <circle cx="115" cy="65" r="8" fill="white"/>
  <circle cx="87" cy="65" r="4" fill="#333"/>
  <circle cx="117" cy="65" r="4" fill="#333"/>
  <!-- 鼻子 -->
  <polygon points="100,75 95,82 105,82" fill="#FF69B4"/>
  <!-- 嘴巴 -->
  <path d="M 90 88 Q 100 95 110 88" stroke="#333" stroke-width="2" fill="none"/>
  <!-- 腮红 -->
  <circle cx="70" cy="80" r="8" fill="#FFB6C1" opacity="0.6"/>
  <circle cx="130" cy="80" r="8" fill="#FFB6C1" opacity="0.6"/>
  <!-- 翅膀 -->
  <ellipse cx="55" cy="110" rx="15" ry="25" fill="#87CEEB" opacity="0.7" transform="rotate(-20 55 110)"/>
  <ellipse cx="145" cy="110" rx="15" ry="25" fill="#87CEEB" opacity="0.7" transform="rotate(20 145 110)"/>
  <!-- 小帽子 -->
  <ellipse cx="100" cy="35" rx="25" ry="8" fill="#FF6347"/>
  <polygon points="100,10 85,35 115,35" fill="#FF6347"/>
  <!-- 星星装饰 -->
  <text x="100" y="20" text-anchor="middle" font-size="12">⭐</text>
</svg>
