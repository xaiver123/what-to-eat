    <ellipse cx="65" cy="30" rx="8" ry="12" fill="url(#mowan-ear)"/>
    
    <circle cx="40" cy="48" r="5" fill="#B71C1C"/>
    <circle cx="60" cy="48" r="5" fill="#B71C1C"/>
    <circle cx="41" cy="47" r="2" fill="white"/>
    <circle cx="61" cy="47" r="2" fill="white"/>
    
    <path d="M 42 58 Q 50 55 58 58" stroke="#B71C1C" stroke-width="3" fill="none"/>
    
    <ellipse cx="32" cy="55" rx="4" ry="3" fill="#EF5350" opacity="0.6"/>
    <ellipse cx="68" cy="55" rx="4" ry="3" fill="#EF5350" opacity="0.6"/>
    
    <circle cx="50" cy="8" r="5" fill="#FFEBEE"/>
    <path d="M 45 10 L 47 5 L 50 10 L 53 5 L 55 10" stroke="#B71C1C" stroke-width="2" fill="none"/>
